name: CI

#
# The primary workflow for continues integration.
#

on:
  workflow_dispatch:
  pull_request:
  merge_group:
  push:
    branches:
      - "**"
  schedule:
    # At 04:10 on Monday.
    - cron: 10 4 * * 1

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

defaults:
  run:
    shell: bash

jobs:
  fix-check:
    name: Fix & Check
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      UV_PYTHON_PREFERENCE: only-system
      UV_PYTHON_DOWNLOADS: never
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up just
        uses: extractions/setup-just@53165ef7e734c5c07cb06b3c8e7b647c5aa16db3 # v4.0.0

      # Used by mise to verify tools with aqua backend.
      - name: Set up Cosign
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2

      # Extract subset of mise tools configuration to separate files which are
      # used in subsequent steps as part of cache keys.
      - name: Extract mise tools
        id: extract-mise-tools
        run: |
          mkdir -p .tmp
          pipx=.tmp/mise-pipx.toml
          echo "pipx=$pipx" | tee -a $GITHUB_OUTPUT
          grep -F -e pipx mise.toml | tee $pipx

      # Init pip cache dir to prevent failure of workflow run with error about
      # cache folder not existing and that the cache step should be removed.
      - name: Init pip cache dir
        run: mkdir -p ~/.cache/pip

      - name: Set up Python
        id: set-up-python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version-file: pyproject.toml

      - name: Set up Astral uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          enable-cache: true
          cache-suffix: fix-check
          cache-dependency-glob: |
            uv.lock
            ${{ steps.extract-mise-tools.outputs.pipx }}

      - name: Cache pre-commit cache
        uses: actions/cache@2c8a9bd7457de244a408f35966fab2fb45fda9c8 # v6.0.0
        with:
          path: ~/.cache/pre-commit
          key: >-
            pre-commit cache dir
            ${{ hashFiles('.pre-commit-config.yaml') }}

      - name: Set up mise
        uses: jdx/mise-action@e6a8b3978addb5a52f2b4cd9d91eafa7f0ab959d # v4.2.0
        env:
          MISE_JOBS: 1
          MISE_VERBOSE: 1
        with:
          install: true
          cache: true
          cache_key_prefix: ${{ steps.set-up-python.outputs.python-version }}

      - name: Run recipes that fix stuff
        run: just fix

      - name: Run recipes that check stuff
        run: just check

      - name: Commit and push changes
        if: |
          cancelled() == false &&
          github.actor != 'dependabot[bot]' &&
          github.ref_type != 'tag' &&
          startsWith(github.ref, 'refs/head/renovate/') == false
        id: auto-commit-action
        uses: stefanzweifel/git-auto-commit-action@04702edda442b2e678b25b537cec683a1493fcb9 # v7.1.0
        with:
          commit_message: "ci: Apply automatic improvements"
          commit_options: --no-verify --signoff

  test:
    name: Test
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      UV_PYTHON_PREFERENCE: only-system
      UV_PYTHON_DOWNLOADS: never
    strategy:
      matrix:
        python-version:
          - min
          - max
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Determine python-version
        id: python-version
        run: |
          if [[ ${{ matrix.python-version }} == min ]]; then
            python_version=$(
              grep --basic-regexp --regexp='^requires-python' pyproject.toml |
                grep --extended-regexp --only-matching --regexp='[0-9]+\.[0-9]+'
            )
          else
            python_version=$(
              grep --basic-regexp --regexp='^requires-python' pyproject.toml |
                grep --extended-regexp --only-matching --regexp='[0-9]+\.'
            )x
          fi

          echo "value=$python_version" | tee -a $GITHUB_OUTPUT

      - name: Set up just
        uses: extractions/setup-just@53165ef7e734c5c07cb06b3c8e7b647c5aa16db3 # v4.0.0

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: ${{ steps.python-version.outputs.value }}

      - name: Set up Astral uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          enable-cache: true
          cache-suffix: test
          cache-dependency-glob: |
            uv.lock

      - name: Run tests
        run: just test
